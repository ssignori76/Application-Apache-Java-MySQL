services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: lusig76/java-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: java-backend
    environment:
      - DB_HOST=db
      - DB_NAME=app_db
      - DB_USER=app_user
      - DB_PASSWORD=app_password
      # Configurable logging via environment variables
      - LOG_LEVEL_ROOT=INFO
      - LOG_LEVEL_APP=DEBUG
      # - LOG_PATTERN_CONSOLE={"@timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}","level":"%level","logger":"%logger{36}","message":"%msg"}%n
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/services"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: lusig76/apache-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apache-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data: