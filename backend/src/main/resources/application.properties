spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:app_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:app_user}
spring.datasource.password=${DB_PASSWORD:app_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Default Session cookie config
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
# Needs to be false for local testing without https
server.servlet.session.cookie.secure=false

# Logging configuration (required by the spec)
# Can be overridden by env variables
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.example.backend=${LOG_LEVEL_APP:DEBUG}
# Log structure (text format by default, can be overridden if needed via LOG_PATTERN_CONSOLE)
logging.pattern.console=${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n}

server.port=8080
spring.mvc.pathmatch.matching-strategy=ant_path_matcher