apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-config
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(255) UNIQUE NOT NULL,
        password VARCHAR(255) NOT NULL,
        first_name VARCHAR(255) NOT NULL,
        last_name VARCHAR(255) NOT NULL,
        role VARCHAR(50) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS services (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(255) UNIQUE NOT NULL,
        description VARCHAR(255) NOT NULL,
        price DOUBLE NOT NULL
    );

    CREATE TABLE IF NOT EXISTS orders (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        user_id BIGINT NOT NULL,
        service_id BIGINT NOT NULL,
        status VARCHAR(50) NOT NULL,
        note TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (user_id) REFERENCES users(id),
        FOREIGN KEY (service_id) REFERENCES services(id)
    );

    -- Seed Data

    -- Insert admin and customer. Password for both is 'P@ssw0rd!'
    INSERT IGNORE INTO users (username, password, first_name, last_name, role) VALUES 
    ('admin', '$2b$12$nfZIjfgGKuzM8LI66yeoiOgg9CkabDNrFLFM7I1yqJHck9E6QNlHO', 'Admin', 'User', 'ADMIN'),
    ('customer', '$2b$12$nfZIjfgGKuzM8LI66yeoiOgg9CkabDNrFLFM7I1yqJHck9E6QNlHO', 'Mario', 'Rossi', 'CUSTOMER');

    -- Insert 3 predefined services
    INSERT IGNORE INTO services (name, description, price) VALUES 
    ('Base', 'Servizio base di abbonamento', 9.99),
    ('Medio', 'Servizio intermedio con funzionalita avanzate', 19.99),
