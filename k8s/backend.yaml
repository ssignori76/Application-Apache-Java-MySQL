apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: apache-java-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: lusig76/java-backend:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: db
        - name: DB_NAME
          value: app_db
        - name: DB_USER
          value: app_user
        - name: DB_PASSWORD
          value: app_password
        - name: LOG_LEVEL_ROOT
          value: INFO
        - name: LOG_LEVEL_APP
          value: DEBUG
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: apache-java-mysql
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
