<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Application Dashboard</h1>
        
        <div id="alertBox" class="alert hidden"></div>

        <!-- Login Section -->
        <div id="loginSection">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <br>
            <h2>Available Services (Public)</h2>
            <table id="publicServicesTable">
                <thead><tr><th>Name</th><th>Description</th><th>Price</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Authenticated Section -->
        <div id="authSection" class="hidden">
            <div class="nav">
                <span id="userInfo"></span>
                <button id="logoutBtn" style="float: right;">Logout</button>
            </div>
            
            <!-- Customer Area -->
            <div id="customerArea" class="hidden">
                <h2>My Orders</h2>
                <button id="refreshOrdersBtn">Refresh Orders</button>
                <table id="customerOrdersTable">
                    <thead><tr><th>Order ID</th><th>Service</th><th>Status</th><th>Note</th><th>Date</th></tr></thead>
                    <tbody></tbody>
                </table>

                <h2>Buy a Service</h2>
                <form id="buyServiceForm">
                    <div class="form-group">
                        <label>Select Service</label>
                        <select id="serviceSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="orderNote" rows="3"></textarea>
                    </div>
                    <button type="submit">Submit Order</button>
                </form>
            </div>

            <!-- Admin Area -->
            <div id="adminArea" class="hidden">
                <h2>All Orders</h2>
                <div class="form-group">
                    <label>Filter by Status</label>
                    <select id="statusFilter">
                        <option value="">All</option>
                        <option value="SUBMITTED">SUBMITTED</option>
                        <option value="IN_PROGRESS">IN_PROGRESS</option>
                        <option value="COMPLETED">COMPLETED</option>
                        <option value="CANCELLED">CANCELLED</option>
                    </select>
                    <button id="filterOrdersBtn">Filter</button>
                </div>
                <table id="adminOrdersTable">
                    <thead><tr><th>ID</th><th>Customer</th><th>Service</th><th>Status</th><th>Note</th><th>Date</th></tr></thead>
                    <tbody></tbody>
                </table>

                <h2>Manage Users</h2>
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="manageUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Password (Required for new)</label>
                        <input type="password" id="managePassword">
                    </div>
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="manageFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="manageLastName" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="manageRole">
                            <option value="CUSTOMER">CUSTOMER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                    <button type="submit" id="saveUserBtn">Create/Update User</button>
                    <button type="button" id="clearUserBtn">Clear</button>
                </form>

                <table id="usersTable">
                    <thead><tr><th>ID</th><th>Username</th><th>Name</th><th>Role</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
